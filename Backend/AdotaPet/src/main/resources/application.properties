spring.application.name=AdotaPet

# Conexao com o banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/adotapet?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=SafiraRuby
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Sem isto, o schema.sql só é executado para bases de dados embutidas (H2, etc.),
# nunca para o MySQL. "always" garante que as tabelas sejam criadas no arranque.
spring.sql.init.mode=always